name: OTA Dump Bot

on:
  schedule:
    - cron: "0 */6 * * *"   # setiap 6 jam
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip unzip
          pip3 install aiogram==3.*

      - name: Download otaripper
        run: |
          wget https://github.com/syedinsaf/otaripper/releases/download/v3.3.0/otaripper-3.3.0-linux-x86_64.tar.gz -O otaripper.tar.gz
          tar -xvf otaripper.tar.gz
          chmod +x otaripper

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          python3 bot.py
