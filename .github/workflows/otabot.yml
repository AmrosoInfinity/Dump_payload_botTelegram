name: OTA Ripper Telegram Bot

on:
  schedule:
    # Cadangan otomatis jika pemicu berantai terputus (jalan setiap 6 jam)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Dapat dipicu manual dari tab Actions GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot httpx

    - name: Download and Setup Otaripper
      run: |
        # Mengunduh versi x86_64 agar kompatibel dengan runner ubuntu-latest
        wget https://github.com/syedinsaf/otaripper/releases/download/v3.3.0/otaripper-3.3.0-linux-x86_64.tar.gz
        tar -xvf otaripper-3.3.0-linux-x86_64.tar.gz
        chmod +x otaripper
        ./otaripper -V

    - name: Start Telegram Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: |
        # Batasi proses bot selama 5 jam 30 menit (19800 detik)
        # Ini agar bot mati secara bersih sebelum menyentuh limit keras 6 jam GitHub
        timeout 19800 python bot.py || echo "Sesi bot selesai secara aman."

    - name: Trigger Next Session (Looping)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Menghidupkan ulang workflow untuk sesi berikutnya..."
        gh workflow run "OTA Ripper Telegram Bot"
